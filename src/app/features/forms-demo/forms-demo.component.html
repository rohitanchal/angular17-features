<h2>Feature 11: Reactive Forms</h2>


<strong>Reactive Form Demo</strong>

<form [formGroup]="userForm" (submit)="submit()">
    <label>Name:</label>
    <input class="form-control" formControlName="name" />

    <label>Email:</label>
    <input class="form-control" formControlName="email">


    <button class="btn btn-outline-success my-3">Submit</button>
</form>

<strong class="typewriter text-success">Live Value:</strong>


<pre>{{userForm.value | json}}</pre>
